---
layout: default
title: Top
---

<h2>記事一覧（カテゴリ別）</h2>

{% for category in site.categories %}
  <div class="category-section">
    <h3>📂 {{ category[0] | upcase }}</h3>

    <ul>
      {% for post in category[1] %}
        <li>
          <span style="color: #666;">{{ post.date | date: "%Y/%m/%d" }}</span> —
          <a href="{{ post.url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endfor %}
