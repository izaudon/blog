---
layout: default
title: memo
---
<h2>記事一覧</h2>

<ul>
  {% for post in site.categories.post_memo %}
    <li>
      <span style="color: #666;">{{ post.date | date: "%Y/%m/%d" }}</span> -
      <a href="{{ post.url| relative_url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
<p>
  <a href="{{ '/' | relative_url }}">
    トップに戻る
  </a>
</p>
